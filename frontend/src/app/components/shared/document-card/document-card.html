<!-- --------------------------------------------------------------------------
     DOCUMENT CARD: Document/ticket information card
     -------------------------------------------------------------------------- -->

<!-- Reusable SVG gradient (hidden, only defines the gradient) -->
<svg class="document-card__defs" aria-hidden="true">
  <defs>
    <linearGradient id="grad-document-card" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="var(--color-primary)" />
      <stop offset="100%" stop-color="var(--color-secondary)" />
    </linearGradient>
  </defs>
</svg>

<article class="document-card" [class.document-card--clickable]="documentId() !== undefined" [routerLink]="documentId() !== undefined ? ['/documents', documentId()] : null" [queryParams]="groupId() !== undefined ? { groupId: groupId() } : {}">
  <!-- --------------------------------------------------------------------------
       HEADER: Type + Title + Category badge
       -------------------------------------------------------------------------- -->
  <header class="document-card__header">
    <!-- Type icon + Title -->
    <div class="document-card__type">
      <fa-icon
        class="document-card__type-icon"
        [icon]="typeIcon()"
        aria-hidden="true"
      />
      <span class="document-card__title">{{ title() }}</span>
    </div>

    <!-- Category badge -->
    <span class="document-card__badge">{{ category() }}</span>
  </header>

  <!-- --------------------------------------------------------------------------
       BODY: Entity + Dates
       -------------------------------------------------------------------------- -->
  <section class="document-card__body">
    <!-- Entity -->
    <p class="document-card__row">
      <fa-icon
        class="document-card__icon"
        [icon]="faBuilding"
        aria-hidden="true"
      />
      <span>
        <strong>Entidad: </strong>{{ entity() }}
      </span>
    </p>

    <!-- Issue date -->
    <p class="document-card__row">
      <fa-icon
        class="document-card__icon"
        [icon]="faCalendarCheck"
        aria-hidden="true"
      />
      <span>
        <strong>Emisión: </strong>{{ issueDate() }}
      </span>
    </p>

    <!-- Expiry date -->
    <p class="document-card__row">
      <fa-icon
        class="document-card__icon"
        [icon]="faCalendarXmark"
        aria-hidden="true"
      />
      <span>
        <strong>Expiración: </strong>{{ expiryDate() }}
      </span>
    </p>
  </section>

  <!-- --------------------------------------------------------------------------
       SEPARATOR + STATUS
       -------------------------------------------------------------------------- -->
  <hr class="document-card__separator" />

  <footer class="document-card__footer">
    <fa-icon
      class="document-card__status-icon"
      [class.document-card__status-icon--expired]="isExpired()"
      [icon]="isExpired() ? faCircleExclamation : faCircleCheck"
      aria-hidden="true"
    />
    <span class="document-card__status" [class.document-card__status--expired]="isExpired()">{{ statusText() }}</span>
  </footer>
</article>
