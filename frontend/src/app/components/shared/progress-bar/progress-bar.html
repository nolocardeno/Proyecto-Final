<!-- --------------------------------------------------------------------------
     PROGRESS BAR: Barra de progreso con fill animado
     -------------------------------------------------------------------------- -->
<figure
  class="progress-bar"
  [class.progress-bar--orange]="variant() === 'orange'"
  [class.progress-bar--sm]="size() === 'sm'"
  role="progressbar"
  [attr.aria-valuenow]="value()"
  aria-valuemin="0"
  aria-valuemax="100"
>
  <span class="progress-bar__fill" [style.width.%]="value()"></span>
</figure>
