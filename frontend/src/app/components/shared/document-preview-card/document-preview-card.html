<article class="preview-card">
  <header class="preview-card__header">
    <h2 class="preview-card__title">Vista previa del documento</h2>
  </header>

  @if (imagePath()) {
    <figure class="preview-card__figure">
      <img
        class="preview-card__image preview-card__image--clickable"
        [src]="imagePath()!"
        [alt]="alt()"
        (click)="openLightbox.emit(imagePath()!)"
      />
    </figure>
  } @else {
    <figure class="preview-card__empty" aria-label="No hay imagen disponible">
      <fa-icon class="preview-card__empty-icon" [icon]="faImage" aria-hidden="true" />
      <figcaption class="preview-card__empty-text">No hay imagen disponible</figcaption>
    </figure>
  }
</article>
