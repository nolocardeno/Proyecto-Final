<header class="header">
  <!-- --------------------------------------------------------------------------
       BOTÓN HAMBURGUESA — Solo visible en <lg cuando hay sesión.
       Controla el drawer del sidebar mediante SidebarService.
       -------------------------------------------------------------------------- -->
  @if (authService.isLoggedIn()) {
    <button
      type="button"
      class="header__menu-toggle"
      [attr.aria-expanded]="sidebar.isOpen()"
      aria-controls="app-sidebar"
      [attr.aria-label]="sidebar.isOpen() ? 'Cerrar menú' : 'Abrir menú'"
      (click)="sidebar.toggle()"
    >
      <fa-icon [icon]="menuIcon()" />
    </button>
  }

  <!-- --------------------------------------------------------------------------
       BRAND (Logo + Texto)
       -------------------------------------------------------------------------- -->
  <a [routerLink]="authService.isLoggedIn() ? '/dashboard' : '/'" class="header__brand">
    <picture>
      <source srcset="assets/images/Logo Scantral.webp" type="image/webp" />
      <img
        src="assets/images/Logo Scantral.png"
        alt="Logo de Scantral"
        class="header__logo"
        loading="lazy"
        width="65"
        height="65"
      />
    </picture>
    <span class="header__title">Scantral</span>
  </a>

  <!-- --------------------------------------------------------------------------
       NAVEGACIÓN: Varía según estado de sesión
       -------------------------------------------------------------------------- -->
  @if (authService.isLoggedIn()) {
    <nav class="header__nav">
      <app-theme-toggle />
      <app-user-card
        variant="header"
        [username]="authService.user()!.name"
        subtitle="Usuario"
        [photoUrl]="authService.profileImageUrl()"
      />
    </nav>
  } @else {
    <nav class="header__nav">
      <app-theme-toggle />
      <button type="button" (click)="authModal.openLogin()" class="header__link">Iniciar sesión</button>
      <app-button variant="primary" size="md" (click)="authModal.openRegister()">Crear cuenta</app-button>
    </nav>
  }
</header>
