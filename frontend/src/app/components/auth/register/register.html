<!-- --------------------------------------------------------------------------
     MODAL REGISTRO: Formulario de creación de cuenta
     -------------------------------------------------------------------------- -->
<app-auth-card title="Creación de cuenta">
  <form class="register" [formGroup]="registerForm" (ngSubmit)="onSubmit()">
    <app-form-field
      label="Email"
      type="email"
      inputId="register-email"
      formControlName="email"
    />

    <app-form-field
      label="Contraseña"
      type="password"
      inputId="register-password"
      formControlName="password"
    />

    <app-form-field
      label="Confirmar contraseña"
      type="password"
      inputId="register-confirm-password"
      formControlName="confirmPassword"
    />

    <fieldset class="register__legal">
      <app-form-checkbox
        label="He leído y acepto los términos"
        checkboxId="register-accept-terms"
        formControlName="acceptTerms"
      />
      <p class="register__legal-text">
        Antes de continuar revisa los
        <a routerLink="/terms" (click)="onLegalLink()">Términos y condiciones</a>
        y la
        <a routerLink="/privacy" (click)="onLegalLink()">Política de privacidad</a>.
      </p>
    </fieldset>

    <hr class="register__separator" />

    <app-button variant="primary" size="auth" type="submit" class="register__action" [disabled]="loading || registerForm.invalid">
      {{ loading ? 'Creando...' : 'Crear cuenta' }}
    </app-button>
  </form>
</app-auth-card>
