<!-- --------------------------------------------------------------------------
     PÁGINA GROUPS: Sidebar + Área de contenido
     -------------------------------------------------------------------------- -->
<app-sidebar
  [currentPage]="currentPage()"
  (onNavigate)="onNavigate($event)"
/>

<section class="groups__contenido">
  <!-- ------------------------------------------------------------------
       PAGE HEADER
       ------------------------------------------------------------------ -->
  <app-page-header
    title="Grupos"
    subtitle="Consulta todos tus grupos, miembros asociados a ellos, documentos..."
  >
    <app-button buttons variant="text" (click)="joinGroupModal.open()">
      <fa-icon [icon]="faUserPlus" aria-hidden="true" /> Unirse a un grupo
    </app-button>
    <app-button buttons variant="text" (click)="groupModal.open()">
      <fa-icon [icon]="faCirclePlus" aria-hidden="true" /> Crear grupo
    </app-button>
  </app-page-header>

  <!-- ------------------------------------------------------------------
       BUSCADOR
       ------------------------------------------------------------------ -->
  <app-search-bar
    placeholder="Busca grupos..."
    [(value)]="searchTerm"
    (searchChange)="onSearch($event)"
  />

  <!-- ------------------------------------------------------------------
       CARDS DE GRUPOS
       ------------------------------------------------------------------ -->
  <section class="groups__cards">
    @for (group of filteredGroups(); track group.id) {
      <app-group-card
        [name]="group.name"
        [memberCount]="group.memberCount"
        [documentCount]="group.documentCount"
        [activeDocumentCount]="group.activeDocumentCount"
        [expiredDocumentCount]="group.expiredDocumentCount"
        [members]="group.memberPreviews ?? []"
        (viewDocuments)="onViewDocuments(group.id)"
      />
    } @empty {
      <p class="groups__empty">No se encontraron grupos.</p>
    }
  </section>
</section>

<!-- --------------------------------------------------------------------------
     MODAL CREAR GRUPO
     -------------------------------------------------------------------------- -->
@if (groupModal.isOpen()) {
  <app-create-group-modal (groupCreated)="onGroupCreated()" />
}

<!-- --------------------------------------------------------------------------
     MODAL UNIRSE A GRUPO
     -------------------------------------------------------------------------- -->
@if (joinGroupModal.isOpen()) {
  <app-join-group-modal (groupJoined)="onGroupJoined()" />
}
