spring.application.name=Scantral
spring.profiles.active=dev

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/scantral
spring.datasource.username=scantral
spring.datasource.password=scantral_dev
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# File uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
scantral.uploads.path=./uploads

# ---- Seguridad / JWT ----
# Secreto de firma del token JWT (mínimo 32 bytes para HS256). En producción
# inyectar mediante variable de entorno; valor por defecto sólo apto para dev.
scantral.security.jwt.secret=${JWT_SECRET:dev-only-change-me-please-32-bytes-minimum-secret-key-1234567890}
scantral.security.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ---- OpenAPI / Swagger UI ----
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha

# ---- Document processing pipeline (Sprint 6/7) ----
# AI (primary extractor): Google Gemini (free tier).
scantral.ai.api-key=${GOOGLE_API_KEY:}
scantral.ai.model=${AI_MODEL:gemini-2.5-flash-lite}
scantral.ai.url=${AI_URL:https://generativelanguage.googleapis.com/v1beta/models}
scantral.ai.timeout-ms=30000

# OCR fallback (PaddleOCR sidecar microservice).
# The Python container exposes /ocr; see ./paddleocr-service for details.
scantral.ocr.url=${OCR_SERVICE_URL:http://localhost:8001}
scantral.ocr.timeout-ms=${OCR_TIMEOUT_MS:30000}

# Pipeline thresholds
scantral.processing.confidence-threshold=0.65
scantral.processing.review-threshold=0.7
scantral.processing.max-file-size=10485760

# Server
server.port=8080

# Mail (Resend HTTP API)
# La API key generada en https://resend.com/api-keys.
# El remitente (MAIL_FROM) debe pertenecer a un dominio verificado en Resend.
scantral.resend.api-key=${RESEND_API_KEY:}
scantral.mail.from=${MAIL_FROM:no-reply@scantral.local}
