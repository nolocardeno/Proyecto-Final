# =================================================================
# Perfil de test — base de datos H2 en memoria.
#
# Hibernate genera el esquema (create-drop) para que los tests con
# @DataJpaTest y @SpringBootTest funcionen sin necesidad de Postgres.
# =================================================================

spring.datasource.url=jdbc:h2:mem:scantral_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

scantral.security.jwt.secret=test-only-secret-key-with-32-bytes-minimum-please-1234567890
scantral.security.jwt.expiration-ms=3600000

scantral.uploads.path=./uploads-test
