name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Opt in to Node.js 24 runtime for JavaScript actions to silence the
# Node.js 20 deprecation warnings (default starting June 2nd, 2026).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  backend:
    name: Backend (Spring Boot)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: scantral
          POSTGRES_USER: scantral
          POSTGRES_PASSWORD: scantral_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U scantral"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # @SpringBootTest contextLoads() boots the full app, which resolves
      # these placeholders from application.properties. Provide empty
      # values so the Spring context can start in CI.
      MAIL_USERNAME: ''
      MAIL_PASSWORD: ''
      GOOGLE_API_KEY: ''

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Build & test
        run: ./mvnw -B verify

  frontend:
    name: Frontend (Angular)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build -- --configuration production

  ocr:
    name: PaddleOCR service (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: paddleocr-service
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Syntax check
        run: python -m py_compile app.py
