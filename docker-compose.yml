services:
  frontend:
    build: ./frontend
    container_name: scantral-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend

  backend:
    build: ./backend
    container_name: scantral-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/scantral
      SPRING_DATASOURCE_USERNAME: scantral
      SPRING_DATASOURCE_PASSWORD: scantral_dev
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      OCR_SERVICE_URL: http://paddleocr:8001
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      paddleocr:
        condition: service_healthy

  paddleocr:
    build: ./paddleocr-service
    container_name: scantral-paddleocr
    environment:
      OCR_LANGUAGE: ${OCR_LANGUAGE:-latin}
      OCR_USE_GPU: "false"
    expose:
      - "8001"
    volumes:
      # Persist downloaded PP-OCR model files (~16 MB) so they don't have to
      # be re-downloaded from paddleocr.bj.bcebos.com every time the
      # container is recreated. PaddleOCR caches models under $HOME/.paddleocr;
      # the Dockerfile pins HOME=/app, so this is where the cache actually
      # lives — mounting /root/.paddleocr would silently fail to persist.
      - paddleocr_models:/app/.paddleocr
    restart: unless-stopped

  postgres:
    image: postgres:17
    container_name: scantral-db
    environment:
      POSTGRES_DB: scantral
      POSTGRES_USER: scantral
      POSTGRES_PASSWORD: scantral_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scantral"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  uploads:
  paddleocr_models:
